<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>A Quote A Day</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;600;700&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" crossorigin="anonymous"/>
<style>
/* ─── BASE & THEME ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --obsidian: #ffffff; --deep: #faf7f2; --surface: #ffffff; --surface2: #f5efe6;
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.35); --crimson: #7A0019; --text: #2a2a2a;
  --text-muted: #7a766f; --text-dim: #b0a99f; --border: rgba(0,0,0,0.06);
  --serif: 'Playfair Display', Georgia, serif; --mono: 'DM Mono', monospace;
  --sans: 'Raleway', sans-serif; --fraktur: 'UnifrakturMaguntia', serif;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06); --shadow-gold: 0 8px 24px rgba(201,168,76,0.18);
  --header-pad-v: 14px; --header-title-size: clamp(28px, 5.5vw, 50px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --deep: #18160f; --surface: #1f1c14; --surface2: #282318;
    --text: #e8e0d0; --text-muted: #9a9080; --text-dim: #5a5248;
    --border: rgba(255,255,255,0.06); --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  }
}

body { background: var(--deep); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ─── MASTHEAD & NAV ─── */
.masthead { background: rgba(255,255,255,0.94); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); text-align: center; padding: var(--header-pad-v) 20px 0; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm); transition: 0.3s; }
.masthead.shrunk { --header-pad-v: 6px; }
.masthead-meta { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.masthead-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: var(--header-title-size); color: var(--text); letter-spacing: 2px; }
.nav-bar { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; }
.quick-tab { font-family: var(--sans); font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 6px 14px; cursor: pointer; background: none; border: 1px solid transparent; border-radius: 20px; color: var(--text-muted); }
.quick-tab.active { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: white; box-shadow: 0 3px 10px rgba(201,168,76,0.3); }

/* ─── FEED & CARDS ─── */
.newspaper-body { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; }
.col-grid { display: grid; gap: 14px; padding: 14px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; cursor: pointer; transition: 0.3s; }
.q-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-gold); }
.today-hero { background: linear-gradient(145deg, var(--surface), var(--surface2)); border-top: 4px solid var(--gold); border-radius: 0 0 16px 16px; padding: 32px; position: relative; overflow: hidden; }

/* ─── DECK VIEWER ─── */
.deck-overlay { position: fixed; inset: 0; background: rgba(20,16,10,0.9); backdrop-filter: blur(6px); z-index: 200; display: none; flex-direction: column; }
.deck-overlay.open { display: flex; }
.deck-track { display: flex; height: 100%; transition: transform 0.3s ease; }
.deck-slide { flex: 0 0 100vw; width: 100vw; display: flex; justify-content: center; padding: 20px 16px; overflow-y: auto; }
.deck-card { background: var(--surface); border-radius: 20px; width: 100%; max-width: 560px; padding: 28px; }

/* ─── DIRECTORY ─── */
.dir-panel { position: fixed; top: 0; right: 0; width: 380px; max-width: 92vw; height: 100dvh; background: var(--surface); z-index: 160; transform: translateX(100%); transition: 0.36s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; border-left: 1px solid var(--gold-border); }
.dir-panel.open { transform: translateX(0); }
.dir-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 150; opacity: 0; pointer-events: none; transition: 0.3s; }
.dir-backdrop.show { opacity: 1; pointer-events: auto; }

/* ─── LOADING ─── */
.loading-page { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
.loading-spinner { font-size: 48px; color: var(--gold); animation: pulse 1.8s infinite; }
@keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>

<header class="masthead" id="masthead">
  <div class="masthead-meta">
    <span id="mastDateline">—</span>
    <span class="masthead-edition">Student Edition</span>
    <span id="mastCount">— quotes</span>
  </div>
  <div class="masthead-title">A Quote A Day</div>
  <nav class="nav-bar">
    <button class="quick-tab active" data-tab="all">✦ All</button>
    <button class="quick-tab" data-tab="authors">Authors</button>
    <button class="quick-tab" data-tab="contributors">Contributors</button>
  </nav>
</header>

<div class="feed-search-wrap" style="max-width:560px; margin:24px auto; padding:0 16px;">
  <input class="feed-search" id="feedSearch" type="search" placeholder="Search wisdom..." style="width:100%; padding:12px 20px; border-radius:30px; border:1px solid var(--border); outline:none;">
</div>

<main class="newspaper-body" id="mainContent">
  <div class="loading-page">
    <div class="loading-spinner">❦</div>
    <div class="loading-text">Typesetting the morning edition…</div>
  </div>
</main>

<div class="dir-backdrop" id="dirBackdrop"></div>
<aside class="dir-panel" id="dirPanel">
  <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
    <h2 id="dirTitle" style="font-family:var(--serif);">Authors</h2>
    <button id="dirClose" style="background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
  </div>
  <div id="dirList" style="flex:1; overflow-y:auto; padding:20px;"></div>
</aside>

<div class="deck-overlay" id="deckOverlay">
  <div style="padding:20px; display:flex; justify-content:space-between; color:white;">
    <button id="deckClose" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
    <div id="deckCounter">1 / 1</div>
  </div>
  <div class="deck-track-wrap" style="flex:1; overflow:hidden;">
    <div class="deck-track" id="deckTrack"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const REPO_OWNER = "AndrewVeda";
const REPO_NAME = "a-quote-a-day";
const QUOTES_DIR = "quotes";

let allQuotes = [];
let _searchQuery = '';
let _deckIdx = 0;
let _deckQuotes = [];

document.addEventListener('DOMContentLoaded', async () => {
  setDateline();
  await fetchQuotes();
  setupFeedSearch();
  setupNav();
});

function setDateline() {
  const now = new Date();
  document.getElementById('mastDateline').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
}

async function fetchQuotes() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${QUOTES_DIR}`);
    if (!res.ok) throw new Error('API Rate Limit or Repo Private');
    const files = await res.json();
    const mdFiles = files.filter(f => f.name.endsWith('.md'));

    const promises = mdFiles.map(async f => {
      const raw = await fetch(f.download_url).then(r => r.text());
      return parseMarkdown(raw, f.name);
    });

    allQuotes = (await Promise.all(promises)).filter(Boolean);
    allQuotes.sort((a, b) => b.date - a.date);
    document.getElementById('mastCount').textContent = `${allQuotes.length} quotes`;
    renderView();
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state">Unable to load quotes. Check connection.</div>`;
  } finally {
    document.querySelector('.loading-page').style.display = 'none';
  }
}

function parseMarkdown(md, filename) {
  const match = md.match(/---([\s\S]*?)---/);
  if (!match) return null;
  const data = {};
  match[1].split('\n').forEach(l => {
    const i = l.indexOf(':');
    if (i !== -1) data[l.substring(0, i).trim()] = l.substring(i + 1).trim();
  });
  const dateMatch = filename.match(/^(\d{4}-\d{2}-\d{2})/);
  const dateStr = dateMatch ? dateMatch[1] : '2026-01-01';
  return { ...data, date: new Date(dateStr), dateStr };
}

function renderView() {
    const container = document.getElementById('mainContent');
    container.innerHTML = '';
    const filtered = allQuotes.filter(q => q.quote.toLowerCase().includes(_searchQuery.toLowerCase()) || q.author.toLowerCase().includes(_searchQuery.toLowerCase()));
    
    const grid = document.createElement('div');
    grid.className = 'col-grid';
    filtered.forEach(q => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<p style="font-style:italic; margin-bottom:10px;">"${q.quote}"</p><strong>— ${q.author}</strong>`;
        card.onclick = () => openDeck(filtered, filtered.indexOf(q));
        grid.appendChild(card);
    });
    container.appendChild(grid);
}

function openDeck(quotes, startIdx) {
    _deckQuotes = quotes;
    const track = document.getElementById('deckTrack');
    track.innerHTML = '';
    quotes.forEach((q, i) => {
        const slide = document.createElement('div');
        slide.className = 'deck-slide';
        slide.innerHTML = `
            <div class="deck-card">
                <h3 style="color:var(--gold); margin-bottom:20px;">Quote #${i+1}</h3>
                <p style="font-size:20px; font-style:italic; margin-bottom:20px;">"${q.quote}"</p>
                <p><strong>— ${q.author}</strong></p>
                <div id="giscus-${i}" class="giscus-container" style="margin-top:30px;"></div>
            </div>`;
        track.appendChild(slide);
    });
    document.getElementById('deckOverlay').classList.add('open');
    deckGoTo(startIdx, false);
}

function deckGoTo(i, animate = true) {
    _deckIdx = i;
    const track = document.getElementById('deckTrack');
    track.style.transition = animate ? '0.3s' : 'none';
    track.style.transform = `translateX(-${i * 100}%)`;
    document.getElementById('deckCounter').textContent = `${i + 1} / ${_deckQuotes.length}`;
    loadGiscus(i);
}

function loadGiscus(idx) {
    const container = document.getElementById(`giscus-${idx}`);
    if (container.innerHTML !== "") return;
    const script = document.createElement('script');
    script.src = "https://giscus.app/client.js";
    script.setAttribute("data-repo", "andrewveda/a-quote-a-day");
    script.setAttribute("data-repo-id", "R_kgDORI8-yw");
    script.setAttribute("data-category", "General");
    script.setAttribute("data-category-id", "DIC_kwDORI8-y84C1-Jq");
    script.setAttribute("data-mapping", "specific");
    script.setAttribute("data-term", _deckQuotes[idx].quote.substring(0, 50));
    script.setAttribute("data-theme", "preferred_color_scheme");
    script.crossOrigin = "anonymous";
    script.async = true;
    container.appendChild(script);
}

function setupFeedSearch() {
    document.getElementById('feedSearch').oninput = (e) => {
        _searchQuery = e.target.value;
        renderView();
    };
}

function setupNav() {
    document.getElementById('deckClose').onclick = () => document.getElementById('deckOverlay').classList.remove('open');
}
</script>
</body>
</html>
