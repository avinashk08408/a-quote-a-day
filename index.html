<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>A Quote A Day</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;600;700&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" crossorigin="anonymous"/>
<style>
/* ─── VARIABLES & THEME ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --obsidian: #ffffff; --deep: #faf7f2; --surface: #ffffff; --surface2: #f5efe6;
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.35); --crimson: #7A0019; --text: #2a2a2a;
  --text-muted: #7a766f; --text-dim: #b0a99f; --border: rgba(0,0,0,0.06);
  --serif: 'Playfair Display', Georgia, serif; --mono: 'DM Mono', monospace;
  --sans: 'Raleway', sans-serif; --fraktur: 'UnifrakturMaguntia', serif;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06); --shadow-gold: 0 8px 24px rgba(201,168,76,0.18);
  --header-pad-v: 14px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --deep: #18160f; --surface: #1f1c14; --surface2: #282318;
    --text: #e8e0d0; --text-muted: #9a9080; --text-dim: #5a5248;
    --border: rgba(255,255,255,0.06);
  }
}

body { background: var(--deep); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

/* ─── MASTHEAD ─── */
.masthead { background: rgba(255,255,255,0.94); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); text-align: center; padding: var(--header-pad-v) 20px 0; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm); }
.masthead-meta { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.masthead-title { font-family: 'IM Fell English', serif; font-style: italic; font-size: clamp(32px, 7vw, 60px); color: var(--text); }
.nav-bar { display: flex; justify-content: center; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--border); }
.quick-tab { font-family: var(--sans); font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 6px 14px; cursor: pointer; background: none; border: 1px solid transparent; border-radius: 20px; color: var(--text-muted); transition: 0.2s; }
.quick-tab.active { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: white; }

/* ─── FEED & CARDS ─── */
.newspaper-body { max-width: 1200px; margin: 0 auto; padding: 16px; }
.col-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; }
.q-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-gold); border-color: var(--gold-border); }
.q-card-text { font-family: var(--serif); font-style: italic; font-size: 1.1rem; margin-bottom: 15px; }

/* ─── DECK OVERLAY ─── */
.deck-overlay { position: fixed; inset: 0; background: rgba(20,16,10,0.95); backdrop-filter: blur(10px); z-index: 200; display: none; flex-direction: column; }
.deck-overlay.open { display: flex; }
.deck-track { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.deck-slide { flex: 0 0 100vw; width: 100vw; display: flex; justify-content: center; padding: 20px 16px; overflow-y: auto; }
.deck-card { background: var(--surface); border-radius: 20px; width: 100%; max-width: 560px; padding: 30px; align-self: flex-start; border-top: 4px solid var(--gold); }
.dc-contrib-box { background: var(--gold-dim); border: 1px solid var(--gold-border); border-left: 4px solid var(--gold); border-radius: 12px; padding: 20px; margin: 20px 0; }
.dc-btn { padding: 10px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-family: var(--sans); font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
.dc-btn.primary { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: white; border: none; }

/* ─── DIRECTORY PANEL ─── */
.dir-panel { position: fixed; top: 0; right: 0; width: 400px; max-width: 100vw; height: 100dvh; background: var(--surface); z-index: 300; transform: translateX(100%); transition: 0.4s; display: flex; flex-direction: column; }
.dir-panel.open { transform: translateX(0); }
.dir-row { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
.dir-row:hover { background: var(--gold-dim); }
.dir-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 250; display: none; }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-meta">
    <span id="mastDateline">—</span>
    <span class="masthead-edition">Student Edition</span>
    <span id="mastCount">0 quotes</span>
  </div>
  <div class="masthead-title">A Quote A Day</div>
  <nav class="nav-bar">
    <button class="quick-tab active" data-tab="all">✦ All</button>
    <button class="quick-tab" data-tab="authors">Authors</button>
    <button class="quick-tab" data-tab="contributors">Contributors</button>
    <button class="quick-tab" data-tab="departments">Depts</button>
  </nav>
</header>

<main class="newspaper-body" id="mainContent">
  <div class="loading-page" id="loader">
    <div class="loading-spinner">❦</div>
    <div class="loading-text">Typesetting Wisdom…</div>
  </div>
</main>

<!-- DECK -->
<div class="deck-overlay" id="deckOverlay">
  <div style="padding:15px 25px; display:flex; justify-content:space-between; align-items:center; color:white;">
    <button id="deckClose" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">✕</button>
    <div id="deckCounter" style="font-family:var(--mono); font-size:12px;">1 / 1</div>
  </div>
  <div style="flex:1; overflow:hidden; position:relative;">
    <div class="deck-track" id="deckTrack"></div>
  </div>
</div>

<!-- DIRECTORY -->
<div class="dir-backdrop" id="dirBackdrop"></div>
<aside class="dir-panel" id="dirPanel">
  <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <h2 id="dirTitle" style="font-family:var(--serif);">Directory</h2>
    <button id="dirClose" style="background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
  </div>
  <div id="dirList" style="flex:1; overflow-y:auto;"></div>
</aside>

<script>
const REPO = "AndrewVeda/a-quote-a-day";
const QUOTES_DIR = "quotes";
let allQuotes = [];
let _deckQuotes = [];
let _deckIdx = 0;

// INIT
document.addEventListener('DOMContentLoaded', async () => {
    setDateline();
    await fetchQuotes();
    setupNav();
    setupGestures();
});

function setDateline() {
    const now = new Date();
    document.getElementById('mastDateline').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
}

async function fetchQuotes() {
    try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${QUOTES_DIR}`);
        const files = await res.json();
        const promises = files.filter(f => f.name.endsWith('.md')).map(async f => {
            const raw = await fetch(f.download_url).then(r => r.text());
            return parseMD(raw, f.name);
        });
        allQuotes = (await Promise.all(promises)).filter(Boolean);
        allQuotes.sort((a, b) => b.date - a.date);
        document.getElementById('mastCount').textContent = `${allQuotes.length} quotes`;
        renderFeed(allQuotes);
    } catch (e) {
        console.error(e);
        document.getElementById('mainContent').innerHTML = `<div style="text-align:center; padding:50px;">API Rate Limit reached. Please try again later.</div>`;
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}

function parseMD(md, filename) {
    const match = md.match(/---([\s\S]*?)---/);
    if (!match) return null;
    const data = {};
    match[1].split('\n').forEach(l => {
        const i = l.indexOf(':');
        if (i !== -1) data[l.substring(0, i).trim()] = l.substring(i + 1).trim();
    });
    const dateMatch = filename.match(/^(\d{4}-\d{2}-\d{2})/);
    return { 
        ...data, 
        about: data.what_it_means_to_me || data.about || '',
        date: new Date(dateMatch ? dateMatch[1] : 0),
        dateStr: dateMatch ? dateMatch[1] : 'Unknown'
    };
}

function renderFeed(quotes) {
    const main = document.getElementById('mainContent');
    main.innerHTML = '<div class="col-grid"></div>';
    const grid = main.querySelector('.col-grid');
    quotes.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <div class="q-card-text">"${q.quote}"</div>
            <div style="font-weight:900;">— ${q.author}</div>
            <div style="font-size:12px; color:var(--text-muted); margin-top:5px;">${q.contributor} · ${q.department}</div>
        `;
        card.onclick = () => openDeck(quotes, i);
        grid.appendChild(card);
    });
}

function openDeck(quotes, startIdx) {
    _deckQuotes = quotes;
    const track = document.getElementById('deckTrack');
    track.innerHTML = '';
    quotes.forEach((q, i) => {
        const slide = document.createElement('div');
        slide.className = 'deck-slide';
        slide.innerHTML = `
            <div class="deck-card">
                <div style="font-family:var(--mono); font-size:10px; color:var(--crimson); margin-bottom:15px; letter-spacing:2px; font-weight:700; text-transform:uppercase;">✦ Student Contribution</div>
                <div style="font-family:var(--serif); font-style:italic; font-size:24px; line-height:1.4; border-left:4px solid var(--gold); padding-left:20px; margin-bottom:20px;">"${q.quote}"</div>
                <div style="font-family:var(--serif); font-weight:900; font-size:28px;">${q.author}</div>
                
                <div class="dc-contrib-box">
                    <div style="font-family:var(--mono); font-size:9px; color:var(--gold); font-weight:700; text-transform:uppercase; margin-bottom:5px;">Contributed by</div>
                    <div style="font-family:var(--serif); font-weight:900; font-size:22px;">${q.contributor}</div>
                    <div style="font-family:var(--mono); font-size:10px; color:var(--gold); text-transform:uppercase; margin-top:3px; letter-spacing:1px;">${q.department}</div>
                    
                    ${q.about ? `
                        <div style="height:1px; background:var(--gold-border); margin:15px 0;"></div>
                        <div style="font-family:var(--mono); font-size:9px; color:var(--gold); font-weight:700; text-transform:uppercase; margin-bottom:5px;">What this means to me</div>
                        <div style="font-family:var(--sans); font-style:italic; font-size:14px; color:var(--text-muted); line-height:1.6;">${q.about}</div>
                    ` : ''}
                </div>

                <div style="display:flex; gap:10px; margin-bottom:30px;">
                    <button class="dc-btn primary" onclick="shareWA('${q.quote}', '${q.author}')">📲 WhatsApp</button>
                    <a href="https://github.com/${REPO}/discussions" target="_blank" class="dc-btn" style="text-decoration:none;">💬 Discuss</a>
                </div>

                <div id="giscus-${i}"></div>
            </div>
        `;
        track.appendChild(slide);
    });
    document.getElementById('deckOverlay').classList.add('open');
    deckGoTo(startIdx, false);
}

function deckGoTo(idx, animate = true) {
    _deckIdx = Math.max(0, Math.min(idx, _deckQuotes.length - 1));
    const track = document.getElementById('deckTrack');
    track.style.transition = animate ? 'transform 0.4s' : 'none';
    track.style.transform = `translateX(-${_deckIdx * 100}%)`;
    document.getElementById('deckCounter').textContent = `${_deckIdx + 1} / ${_deckQuotes.length}`;
    loadGiscus(_deckIdx);
}

function loadGiscus(idx) {
    const container = document.getElementById(`giscus-${idx}`);
    if (container.innerHTML !== '') return;
    const script = document.createElement('script');
    script.src = "https://giscus.app/client.js";
    script.setAttribute("data-repo", REPO);
    script.setAttribute("data-repo-id", "R_kgDORI8-yw");
    script.setAttribute("data-category", "General");
    script.setAttribute("data-category-id", "DIC_kwDORI8-y84C1-Jq");
    script.setAttribute("data-mapping", "specific");
    script.setAttribute("data-term", _deckQuotes[idx].quote.substring(0, 50));
    script.setAttribute("data-theme", "preferred_color_scheme");
    script.crossOrigin = "anonymous"; script.async = true;
    container.appendChild(script);
}

// NAVIGATION & DIRECTORY
function setupNav() {
    document.querySelectorAll('.quick-tab').forEach(tab => {
        tab.onclick = () => {
            const type = tab.dataset.tab;
            if (type === 'all') {
                document.querySelectorAll('.quick-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderFeed(allQuotes);
            } else {
                openDir(type);
            }
        };
    });

    document.getElementById('deckClose').onclick = () => document.getElementById('deckOverlay').classList.remove('open');
    document.getElementById('dirClose').onclick = closeDir;
    document.getElementById('dirBackdrop').onclick = closeDir;

    window.onkeydown = (e) => {
        if (!document.getElementById('deckOverlay').classList.contains('open')) return;
        if (e.key === 'ArrowRight') deckGoTo(_deckIdx + 1);
        if (e.key === 'ArrowLeft') deckGoTo(_deckIdx - 1);
        if (e.key === 'Escape') document.getElementById('deckOverlay').classList.remove('open');
    };
}

function openDir(type) {
    const panel = document.getElementById('dirPanel');
    const list = document.getElementById('dirList');
    const title = document.getElementById('dirTitle');
    list.innerHTML = '';
    title.textContent = type.charAt(0).toUpperCase() + type.slice(1);

    const map = {};
    allQuotes.forEach(q => {
        const key = type === 'authors' ? q.author : (type === 'contributors' ? q.contributor : q.department);
        if (!map[key]) map[key] = [];
        map[key].push(q);
    });

    Object.keys(map).sort().forEach(name => {
        const row = document.createElement('div');
        row.className = 'dir-row';
        row.innerHTML = `<strong>${name}</strong> <span style="float:right; color:var(--gold); font-family:var(--mono);">${map[name].length}</span>`;
        row.onclick = () => {
            renderFeed(map[name]);
            closeDir();
        };
        list.appendChild(row);
    });

    panel.classList.add('open');
    document.getElementById('dirBackdrop').style.display = 'block';
}

function closeDir() {
    document.getElementById('dirPanel').classList.remove('open');
    document.getElementById('dirBackdrop').style.display = 'none';
}

function shareWA(text, author) {
    const str = encodeURIComponent(`"${text}" — ${author}\n\nView more at: https://andrewveda.github.io/a-quote-a-day`);
    window.open(`https://wa.me/?text=${str}`);
}

function setupGestures() {
    let touchStartX = 0;
    const overlay = document.getElementById('deckOverlay');
    overlay.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
    overlay.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) {
            if (diff > 0) deckGoTo(_deckIdx + 1);
            else deckGoTo(_deckIdx - 1);
        }
    });
}
</script>
</body>
</html>
