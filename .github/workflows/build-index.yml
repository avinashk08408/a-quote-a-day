name: Build Quote Index

on:
  push:
    branches: [main]
    paths:
      - 'quotes/**.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build index.json
        run: node scripts/build-index.js

      - name: Commit index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quotes/index.json
          git diff --staged --quiet || git commit -m "chore: rebuild quotes/index.json"
          git push
