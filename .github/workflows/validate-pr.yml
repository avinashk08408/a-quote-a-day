name: Validate Quote PR

on:
  pull_request:
    paths:
      - 'quotes/**.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get changed files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          echo "files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^quotes/.*\.json$' | grep -v 'index.json' | grep -v 'TEMPLATE.json' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Validate and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const changedFiles = '${{ steps.changed.outputs.files }}'.trim().split(' ').filter(Boolean);

            if (changedFiles.length === 0) {
              console.log('No quote files changed.');
              return;
            }

            const REQUIRED = ['quote', 'author', 'contributor', 'department'];
            const lines = [];
            let allGood = true;

            for (const file of changedFiles) {
              lines.push(`### 📄 \`${file}\``);

              // 1. Filename format
              const basename = path.basename(file);
              const dateMatch = basename.match(/^(\d{4}-\d{2}-\d{2})-(.+)\.json$/);
              if (!dateMatch) {
                lines.push(`> ❌ **Filename must be \`YYYY-MM-DD-yourname.json\`** (e.g. \`2024-03-15-sunanda-vk.json\`)`);
                allGood = false;
                continue;
              }

              lines.push(`> ✅ Filename format is correct`);
              lines.push(`> 📅 Date: \`${dateMatch[1]}\``);

              // 2. JSON validity
              let data;
              try {
                data = JSON.parse(fs.readFileSync(file, 'utf8'));
              } catch (e) {
                lines.push(`> ❌ **Invalid JSON** — ${e.message}`);
                lines.push(`> 💡 Tip: paste your file at [jsonlint.com](https://jsonlint.com) to find the error`);
                allGood = false;
                continue;
              }

              lines.push(`> ✅ JSON syntax is valid`);

              // 3. Required fields
              const missing = REQUIRED.filter(f => !data[f] || !String(data[f]).trim());
              if (missing.length) {
                lines.push(`> ❌ **Missing fields:** \`${missing.join('`, `')}\``);
                allGood = false;
              } else {
                lines.push(`> ✅ All required fields present`);
              }

              // 4. Reflection nudge
              if (!data.about || !data.about.trim()) {
                lines.push(`> 💬 No reflection written — consider adding one, it makes your entry shine!`);
              } else {
                lines.push(`> ✅ Reflection included`);
              }

              // 5. id warning
              if ('id' in data) {
                lines.push(`> ℹ️ You included an \`id\` field — that's okay, it will be ignored and auto-assigned`);
              }

              // 6. Preview
              if (data.quote && data.author && data.contributor) {
                lines.push(`\n**Preview:**`);
                lines.push(`> *"${data.quote}"*`);
                lines.push(`> — **${data.author}**, shared by ${data.contributor} (${data.department || '?'})`);
              }

              lines.push('');
            }

            const status = allGood
              ? `## ✅ Looks good — ready to merge!`
              : `## ❌ Please fix the errors above before this can be merged`;

            const body = `## Quote Archive — Submission Check\n\n${lines.join('\n')}\n\n---\n${status}`;

            await github.rest.issues.createComment({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            if (!allGood) {
              core.setFailed('Validation failed — see PR comment for details');
            }
